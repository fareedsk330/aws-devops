name: Multi Stage Pipeline
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["test pipeline"]
    types:
      - completed
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  AWS_ROLE_ARN: arn:aws:iam::502309406506:role/service-role/kms_key_creation-role-4yac01fx

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
    
      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
    
      - name: Validate Assumed Role
        run: |
          aws sts get-caller-identity
    
      - name: Build
        run: |
          echo "Building application..."
          mkdir build
          echo "app" > build/app.txt
    
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build/
  
  test:
      runs-on: ubuntu-latest
      needs: build
      steps:
        - name: Configure AWS Credentials using OIDC
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: ${{ env.AWS_ROLE_ARN }}
            aws-region: ${{ env.AWS_REGION }}
      
        - name: Validate Assumed Role
          run: |
            aws sts get-caller-identity
      
        - name: Download Artifact
          uses: actions/download-artifact@v4
          with:
            name: build-artifact
            path: build/
      
        - name: Test
          run: |
            echo "Running tests..."
            cat build/app.txt
      
  deploy:
      runs-on: ubuntu-latest
      needs: test
      steps:
        - name: Configure AWS Credentials using OIDC
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: ${{ env.AWS_ROLE_ARN }}
            aws-region: ${{ env.AWS_REGION }}
      
        - name: Validate Assumed Role
          run: |
            aws sts get-caller-identity
      
        - name: Deploy
          run: |
            echo "Deploying application..."
